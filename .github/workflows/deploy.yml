name: Deploy Go App online

on:
  push:
    branches:
      - master  # 每次 push master 自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ 设置 Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      # 3️⃣ 编译 Go 二进制
      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o app_new

      # 4️⃣ 确保远程目标目录存在
      - name: Ensure target directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/gosrc/gitbuild

      # 4️⃣ 上传二进制到 VPS
      - name: Copy binary to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "app_new"
          target: "${{ secrets.WORK_DIR }}/"

      # 5️⃣ 上传 ssl 文件夹到 VPS
      - name: Copy deploy.sh to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy.sh"
          target: "${{ secrets.WORK_DIR }}/"

      # 5️⃣ 上传 ssl 文件夹到 VPS
      - name: Copy ssl folder to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "ssl"
          target: "${{ secrets.WORK_DIR }}/"
          recursive: true   # 递归上传整个目录

      # 5️⃣ 在 VPS 上执行 deploy.sh
      - name: Run deploy script on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/gosrc/gitbuild
            chmod +x ./deploy.sh
            bash deploy.sh